<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SS</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      background: #000;
      color: #fff;
      line-height: 1.6;
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
      background: #000;
    }
li{max-width: 500px;margin: 0 auto;color: #ccc;}

    /* Top Image Section */
    .hero img {
      width: 100%;
      display: block;
    }

    /* CTA Section */
    .cta {
      padding: 20px;
      text-align: center;
    }

    .cta button {
      background: #25d366;
      color: #fff;
      border: none;
      padding: 14px 24px;
      font-size: 16px;
      border-radius: 30px;
      cursor: pointer;
      font-weight: bold;
    }

    .cta button:hover {
      opacity: 0.9;
    }

    /* Content Section */
    .content {
      padding: 24px 20px 40px;
    }

    .content h2 {
      font-size: 30px;
      margin-bottom: 12px;
      text-align: center;
    }

    .content p {
      font-size: 16px;
      margin-bottom: 14px;
      color: #ccc;
    }

    /* Footer Buttons */
    .links {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      padding: 20px;
    }

    .links a {
      text-decoration: none;
      background: #1a1a1a;
      color: #fff;
      padding: 12px;
      text-align: center;
      border-radius: 8px;
      font-size: 14px;
    }

    .links a:hover {
      background: #2a2a2a;
    }

    footer {
      padding: 16px;
      text-align: center;
      font-size: 12px;
      color: #777;
    }
  </style>


<script src="../tracking.js"></script>



</head>

</html>
